name: Sync to monohatamesi

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT }}

      - name: Force push to monohatamesi
        env:
          SYNC_PAT: ${{ secrets.SYNC_PAT }}
        run: |
          git remote set-url origin https://x-access-token:${SYNC_PAT}@github.com/Jiz41/kibitsureact.git
          git push https://x-access-token:${SYNC_PAT}@github.com/Jiz41/monohatamesi.git HEAD:main --force
