<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Kibitsu RE:act</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
    }
    #game-container {
      position: fixed;
      top: env(safe-area-inset-top);
      left: 0;
      width: 100%;
      height: calc(100% - env(safe-area-inset-top) - env(safe-area-inset-bottom));
      background: #000;
    }
    canvas { display: block; margin: auto; }

    #tut-ov {
      display: none;
      position: fixed; inset: 0; z-index: 9999;
      background: rgba(0,0,0,0.72);
      align-items: center;
      justify-content: center;
    }
    #tut-ov.open { display: flex; }
    #tut-frm {
      width: min(390px, 96vw);
      height: min(844px, 96vh);
      border: none;
      display: block;
    }
  </style>
</head>
<body>
<div id="game-container"></div>
<div id="tut-ov">
  <iframe id="tut-frm" src="tutorial.html"></iframe>
</div>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
'use strict';

/* ── Tutorial overlay ───────────────────────── */
function openTutorial() {
  document.getElementById('tut-ov').classList.add('open');
}
function closeTutorial() {
  document.getElementById('tut-ov').classList.remove('open');
}

/* ── Fullscreen on first tap ────────────────── */
(function () {
  function tryFS() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    document.removeEventListener('pointerdown', tryFS, true);
  }
  document.addEventListener('pointerdown', tryFS, true);
})();

/* ── Scenario data ──────────────────────────── */
let SCENARIO = null;
let hasSeenTerminal = false;

/* ── Save / Options helpers ─────────────────── */
const SAVE_KEY = 'kbt_save';
const OPTS_KEY = 'kbt_opts';
function saveGame(d)  { try { localStorage.setItem(SAVE_KEY, JSON.stringify(d)); } catch(e){} }
function loadGame()   { try { const s = localStorage.getItem(SAVE_KEY); return s ? JSON.parse(s) : null; } catch(e){ return null; } }
function deleteSave() { try { localStorage.removeItem(SAVE_KEY); } catch(e){} }
function saveOpts(o)  { try { localStorage.setItem(OPTS_KEY, JSON.stringify(o)); } catch(e){} }
function loadOpts()   { try { const s = localStorage.getItem(OPTS_KEY); const o = s ? JSON.parse(s) : {}; return { bgmVol: o.bgmVol != null ? o.bgmVol : 0.7, seVol: o.seVol != null ? o.seVol : 0.8 }; } catch(e){ return { bgmVol: 0.7, seVol: 0.8 }; } }

/* ── Layout ────────────────────────────────── */
const W        = 390;
const H        = 844;
const BATTLE_H = 330;
const UI_Y0    = BATTLE_H;
const UI_H     = H - BATTLE_H; // 514

const HDR_H    = 42;
const GRID_TOP = UI_Y0 + HDR_H;                    // 372
const CELL_W   = 120;
const CELL_H   = 70;
const GRID_X0  = (W - CELL_W * 3) / 2;             // 15
const GRID_BOT = GRID_TOP + CELL_H * 3;             // 582
const SLASH_Y  = GRID_BOT + 6;                      // 588
const SLASH_H  = 80;
const DESC_Y   = SLASH_Y + SLASH_H + 6;             // 674

// Super button: battle area bottom-right
const SB_X = W - 66;
const SB_Y = BATTLE_H - 42;

/* ── Kibitsu ────────────────────────────────── */
const KB_X = 72, KB_Y = 190, KB_W = 42, KB_H = 64;
</script>

<script src="js/enemy.js"></script>
<script src="js/charms.js"></script>
<script src="js/scene_title.js"></script>
<script src="js/scene_main.js"></script>
<script src="js/scene_ending.js"></script>

<script>
/* ── Phaser 起動 ────────────────────────────── */
fetch('scenario.json')
  .then(r => r.json())
  .then(data => {
    SCENARIO = data;
    new Phaser.Game({
      type: Phaser.AUTO,
      parent: 'game-container',
      width: W, height: H,
      resolution: window.devicePixelRatio || 1,
      backgroundColor: '#000000',
      scene: [TitleScene, MainScene, EndingScene],
      scale: {
        mode: Phaser.Scale.FIT,
        autoCenter: Phaser.Scale.CENTER_BOTH
      }
    });
  })
  .catch(e => console.error('scenario.json の読み込みに失敗しました:', e));
</script>
</body>
</html>
