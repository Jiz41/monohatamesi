<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>吉備津彦 — 鬼退治</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    canvas { display: block; margin: auto; }
  </style>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<script>
'use strict';

/* ── Fullscreen on first tap ────────────────── */
(function () {
  function tryFS() {
    const el = document.documentElement;
    if (el.requestFullscreen) el.requestFullscreen().catch(() => {});
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    document.removeEventListener('pointerdown', tryFS, true);
  }
  document.addEventListener('pointerdown', tryFS, true);
})();

/* ── Save / Options helpers ─────────────────── */
const SAVE_KEY = 'kbt_save';
const OPTS_KEY = 'kbt_opts';
function saveGame(d)  { try { localStorage.setItem(SAVE_KEY, JSON.stringify(d)); } catch(e){} }
function loadGame()   { try { const s = localStorage.getItem(SAVE_KEY); return s ? JSON.parse(s) : null; } catch(e){ return null; } }
function deleteSave() { try { localStorage.removeItem(SAVE_KEY); } catch(e){} }
function saveOpts(o)  { try { localStorage.setItem(OPTS_KEY, JSON.stringify(o)); } catch(e){} }
function loadOpts()   { try { const s = localStorage.getItem(OPTS_KEY); return s ? JSON.parse(s) : { bgm:true, se:true }; } catch(e){ return { bgm:true, se:true }; } }

/* ── Layout ────────────────────────────────── */
const W        = 390;
const H        = 844;
const BATTLE_H = 330;
const UI_Y0    = BATTLE_H;
const UI_H     = H - BATTLE_H; // 514

const HDR_H    = 42;
const GRID_TOP = UI_Y0 + HDR_H;                    // 372
const CELL_W   = 120;
const CELL_H   = 70;
const GRID_X0  = (W - CELL_W * 3) / 2;             // 15
const GRID_BOT = GRID_TOP + CELL_H * 3;             // 582
const SLASH_Y  = GRID_BOT + 6;                      // 588
const SLASH_H  = 80;
const DESC_Y   = SLASH_Y + SLASH_H + 6;             // 674

// Super button: battle area bottom-right
const SB_X = W - 66;
const SB_Y = BATTLE_H - 42;

/* ── Kibitsu ────────────────────────────────── */
const KB_X = 72, KB_Y = BATTLE_H / 2, KB_W = 42, KB_H = 64;

/* ── Oni ────────────────────────────────────── */
const ONI_HP   = 160, ONI_SPD  = 55, ONI_DMG  = 15;
const ONI_ATK  = 2000, ONI_RNG = 75, ONI_INT  = 2000;
const ONI_WAVE = 10,   ONI_W   = 38, ONI_H    = 54;
const ONI_BW   = 38,   ONI_BH  = 5;

/* ── Named ──────────────────────────────────── */
const NM_HP = 480, NM_SPD = 35, NM_DMG = 25;
const NM_NAMES = ['茨木鬼', '酒呑童子', '大嶽丸', '星熊童子'];

/* ── Boss ───────────────────────────────────── */
const BOSS_HP = 800, BOSS_SPD = 20, BOSS_DMG = 35;
const BOSS_NAMES = ['温羅', '磐石鬼', '暗夜王'];

/* ── Bullet ─────────────────────────────────── */
const BUL_DMG = 20, BUL_MS = 1300, BUL_SPD = 300, BUL_RNG = 320;

/* ── Slash ──────────────────────────────────── */
const SL_BASE = 8, COMBO_STEP = 0.1, COMBO_MAX = 1.3, COMBO_RST = 1500;
const GAUGE_MAX = 100, GAUGE_HIT = 5, SUPER_DMG = 120;

/* ── EXP ────────────────────────────────────── */
const EXP_G = 10, EXP_N = 30, EXP_B = 100;

/* ── Attributes ─────────────────────────────── */
// 相克: 火→地→風→水→火
const ATTR_COLORS = { none:0x888888, fire:0xff4422, water:0x4499ff, earth:0x88bb33, wind:0x99ffaa };
// ゲージ充填色（鮮やか）
const ATTR_FILL  = { none:0x2299ff, fire:0xff5533, water:0x22aaff, earth:0x99dd33, wind:0x55ffcc };
const ATTR_NAMES  = { none:'－', fire:'火', water:'水', earth:'地', wind:'風' };
const ATTR_BEATS  = { fire:'earth', earth:'wind', wind:'water', water:'fire' };
// 有利=等倍(1.0)、中立=0.75、不利=0.5
function attrMult(atk, def) {
  if (!def || def === 'none') return 1.0;
  if (!atk || atk === 'none') return 0.75;
  if (ATTR_BEATS[atk] === def) return 1.0;   // 有利
  if (ATTR_BEATS[def] === atk) return 0.5;   // 不利
  return 0.75;                                // 中立
}

/* ── Charms ─────────────────────────────────── */
const CHARM_DEFS = [
  { id:'water',   name:'水弾符', desc:'最も近い敵に水弾を放つ',      dmg:35, chargeMs:2500, attr:'water' },
  { id:'pierce',  name:'貫通符', desc:'先頭の敵を狙うビームを放つ',  dmg:60, chargeMs:4000, attr:'wind'  },
  { id:'scatter', name:'拡散符', desc:'扇状に拡散弾5発を放つ',       dmg:28, chargeMs:2800, attr:'fire'  },
  { id:'rapid',   name:'連射符', desc:'素早く5連射（威力低め）',     dmg:12, chargeMs:900,  attr:'earth' },
];

/* ══════════════════════════════════════════════ */
class TitleScene extends Phaser.Scene {
  constructor() { super({ key: 'TitleScene' }); }

  create() {
    this._opts    = loadOpts();
    this._hasSave = !!loadGame();

    /* ── PLEASE TAP ── */
    this._tapObjs = [];
    this._tapObjs.push(this.add.rectangle(W/2, H/2, W, H, 0x060c08).setDepth(0));
    this._tapObjs.push(this.add.text(W/2, H/2 - 110, '吉備津彦', {
      fontSize:'44px', color:'#ddcc44', fontFamily:'serif', fontStyle:'bold', stroke:'#000', strokeThickness:6
    }).setOrigin(0.5).setDepth(1));
    this._tapObjs.push(this.add.text(W/2, H/2 - 42, '鬼　退　治', {
      fontSize:'28px', color:'#bb8822', fontFamily:'serif'
    }).setOrigin(0.5).setDepth(1));
    this._tapLbl = this.add.text(W/2, H/2 + 120, 'PLEASE  TAP', {
      fontSize:'20px', color:'#88ffcc', fontFamily:'Arial'
    }).setOrigin(0.5).setDepth(1);
    this._tapObjs.push(this._tapLbl);
    this._blinkTw = this.tweens.add({ targets: this._tapLbl, alpha: 0.1, yoyo: true, repeat: -1, duration: 700 });

    /* ── Title menu ── */
    this._titleObjs = [];
    this._titleObjs.push(this.add.rectangle(W/2, H/2, W, H, 0x060c08).setDepth(0));
    this._titleObjs.push(this.add.text(W/2, 170, '吉備津彦  鬼退治', {
      fontSize:'26px', color:'#ddcc44', fontFamily:'serif', fontStyle:'bold', stroke:'#000', strokeThickness:5
    }).setOrigin(0.5).setDepth(1));
    this._menuBtns = [
      { label:'はじめから', key:'new',  y:360 },
      { label:'つづきから', key:'cont', y:470 },
      { label:'オプション', key:'opts', y:580 },
    ].map(item => {
      const grey = item.key === 'cont' && !this._hasSave;
      const bg  = this.add.rectangle(W/2, item.y, 280, 70, grey ? 0x111111 : 0x0f1e10)
                    .setStrokeStyle(2, grey ? 0x333333 : 0x44aa44).setDepth(1);
      const txt = this.add.text(W/2, item.y, item.label, {
        fontSize:'22px', color: grey ? '#444444' : '#cceecc', fontFamily:'serif'
      }).setOrigin(0.5).setDepth(2);
      this._titleObjs.push(bg, txt);
      return { bg, txt, key: item.key, grey, y: item.y };
    });

    /* ── Options ── */
    this._optsObjs = [];
    this._optsObjs.push(this.add.rectangle(W/2, H/2, W, H, 0x060c08).setDepth(0));
    this._optsObjs.push(this.add.text(W/2, 210, 'オプション', {
      fontSize:'26px', color:'#ffdd88', fontFamily:'serif', fontStyle:'bold'
    }).setOrigin(0.5).setDepth(1));
    this._optBtns = [
      { label:'BGM', key:'bgm', y:370 },
      { label:'SE',  key:'se',  y:480 },
    ].map(item => {
      const bg  = this.add.rectangle(W/2, item.y, 280, 70, 0x0a1822).setStrokeStyle(2, 0x336688).setDepth(1);
      const lbl = this.add.text(W/2 - 70, item.y, item.label, { fontSize:'22px', color:'#aaccff', fontFamily:'serif' }).setOrigin(0.5).setDepth(2);
      const val = this.add.text(W/2 + 70, item.y, 'ON', { fontSize:'22px', color:'#44ffaa', fontFamily:'Arial', fontStyle:'bold' }).setOrigin(0.5).setDepth(2);
      this._optsObjs.push(bg, lbl, val);
      return { bg, lbl, val, key: item.key, y: item.y };
    });
    this._optsCnl = this.add.text(W/2, 630, '戻る', { fontSize:'18px', color:'#667766', fontFamily:'Arial' }).setOrigin(0.5).setDepth(2);
    this._optsObjs.push(this._optsCnl);

    this.input.on('pointerdown', p => this._tap(p));
    this._setPhase('tap');
  }

  _setPhase(phase) {
    this._phase = phase;
    [...this._tapObjs, ...this._titleObjs, ...this._optsObjs].forEach(o => o.setAlpha(0));
    if (phase === 'tap') {
      this._tapObjs.forEach(o => o.setAlpha(1));
      this._blinkTw.resume();
    } else if (phase === 'title') {
      this._blinkTw.pause();
      this._titleObjs.forEach(o => o.setAlpha(1));
    } else if (phase === 'opts') {
      this._blinkTw.pause();
      this._optsObjs.forEach(o => o.setAlpha(1));
      this._refreshOpts();
    }
  }

  _refreshOpts() {
    for (const b of this._optBtns) {
      const on = this._opts[b.key];
      b.val.setText(on ? 'ON' : 'OFF').setStyle({ color: on ? '#44ffaa' : '#aa4444', fontSize:'22px', fontFamily:'Arial', fontStyle:'bold' });
    }
  }

  _tap(ptr) {
    const { x, y } = ptr;
    if (this._phase === 'tap') { this._setPhase('title'); return; }
    if (this._phase === 'title') {
      for (const btn of this._menuBtns) {
        if (Math.abs(y - btn.y) < 38 && Math.abs(x - W/2) < 145) {
          if (btn.grey) return;
          if (btn.key === 'new')  { deleteSave(); this.scene.start('MainScene', { type:'new' }); }
          if (btn.key === 'cont') { this.scene.start('MainScene', { type:'continue' }); }
          if (btn.key === 'opts') { this._setPhase('opts'); }
          return;
        }
      }
    }
    if (this._phase === 'opts') {
      if (Math.abs(y - this._optsCnl.y) < 28) { this._setPhase('title'); return; }
      for (const btn of this._optBtns) {
        if (Math.abs(y - btn.y) < 38) {
          this._opts[btn.key] = !this._opts[btn.key];
          saveOpts(this._opts);
          this._refreshOpts();
          return;
        }
      }
    }
  }
}

/* ══════════════════════════════════════════════ */
class MainScene extends Phaser.Scene {
  constructor() { super({ key: 'MainScene' }); }

  create() {
    this.kbHP = this.kbHPMax = 300;
    this.wave = 1;
    this.spawned = this.defeated = this.spawnTimer = this.bulTimer = 0;
    this.dead = this.waveDone = this.bossSpawned = false;
    this.phase = 'battle';
    this.totalExp = 0;
    this.slashDmg = SL_BASE;
    this.combo = 1.0; this.comboTimer = 0;
    this.gauge = 0; this.gaugeReady = false;
    this.unlockedSlots = 0;
    this.slotCharms  = new Array(9).fill(null);
    this.charmTimers = new Array(9).fill(0);
    this.ownedCharms = CHARM_DEFS.map(c => ({ ...c }));

    // load save on continue
    const _initType = (this.scene.settings.data || {}).type;
    if (_initType === 'continue') {
      const sv = loadGame();
      if (sv) {
        this.wave          = sv.wave;
        this.kbHP          = sv.kbHP;
        this.kbHPMax       = sv.kbHPMax;
        this.slashDmg      = sv.slashDmg;
        this.totalExp      = sv.totalExp;
        this.unlockedSlots = sv.unlockedSlots;
        this.ownedCharms   = sv.ownedCharms;
        this.slotCharms    = sv.slotCharmIds.map(id => id ? (this.ownedCharms.find(c => c.id === id) || null) : null);
        this.charmTimers   = sv.charmTimers;
      }
    }

    this._cpVis = false; this._upgVis = false;

    this._bg();    this._kb();    this._hdr();
    this._grid();  this._slash(); this._desc();
    this._superBtn();
    this._ovBuild();  this._resBuild();
    this._cpBuild();  this._upgBuild();

    this.onis    = this.add.group();
    this.bullets = this.add.group();
    this.sfx     = this.add.graphics().setDepth(10);

    this.input.on('pointerdown', p => this._tap(p));
    this._hdrUp(); this._gridUp();
  }

  /* ── update ─────────────────────────────── */
  update(_t, dt) {
    if (this.dead || this.waveDone) return;

    // combo decay
    if (this.combo > 1.0) {
      this.comboTimer += dt;
      if (this.comboTimer >= COMBO_RST) { this.combo = 1.0; this.comboTimer = 0; this._slashLbl(); }
    }

    // charm charge + auto-fire
    for (let i = 0; i < 9; i++) {
      const c = this.slotCharms[i]; if (!c) continue;
      if (this.charmTimers[i] < c.chargeMs) {
        this.charmTimers[i] = Math.min(c.chargeMs, this.charmTimers[i] + dt);
        this._cellUp(i);
      } else { this._useCharm(i); }
    }

    // spawn grunts
    if (this.spawned < ONI_WAVE) {
      this.spawnTimer += dt;
      if (this.spawnTimer >= ONI_INT) { this.spawnTimer -= ONI_INT; this._spawnOni(); }
    }
    // boss wave
    if (this.spawned >= ONI_WAVE && !this.bossSpawned) {
      this.bossSpawned = true;
      this._spawnOni(false); this._spawnOni(false); this._spawnBoss();
    }

    // oni AI
    for (const oni of [...this.onis.getChildren()]) {
      if (!oni.active) continue;
      if (oni.x - KB_X > ONI_RNG) {
        oni.x -= oni.spd * (dt / 1000);
      } else {
        oni.atkT += dt;
        if (oni.atkT >= ONI_ATK) { oni.atkT -= ONI_ATK; this._kbDmg(oni.dmg); }
      }
      this._oniSync(oni);
      if (oni.x < -60) this._oniRm(oni);
    }

    // auto bullet
    this.bulTimer += dt;
    if (this.bulTimer >= BUL_MS) { this.bulTimer -= BUL_MS; this._bullet(); }

    // move bullets + hit
    const ol = this.onis.getChildren();
    for (const b of [...this.bullets.getChildren()]) {
      if (!b.active) continue;
      b.x += b.vx * (dt / 1000); b.y += b.vy * (dt / 1000);
      if (b.x > KB_X + BUL_RNG || b.x > W + 20 || b.x < -20 || b.y < -20 || b.y > BATTLE_H + 20) {
        b.destroy(); continue;
      }
      for (const oni of ol) {
        if (!oni.active) continue;
        if (Phaser.Math.Distance.Between(b.x, b.y, oni.x, oni.y) < 26) {
          b.destroy(); this._oniDmg(oni, b.dmg || BUL_DMG, b.attr || 'none'); break;
        }
      }
    }

    // wave clear
    if (this.spawned >= ONI_WAVE && this.bossSpawned && this.onis.countActive(true) === 0)
      this._waveClear();

    this._hdrUp();
  }

  /* ── BG ─────────────────────────────────── */
  _bg() {
    this.add.rectangle(W/2, BATTLE_H/2, W, BATTLE_H, 0x1a2e20).setDepth(0);
    this.add.rectangle(W/2, BATTLE_H - 16, W, 32, 0x3a2910).setDepth(0);
    this.add.rectangle(W/2, 6, W, 12, 0x223344).setDepth(0);
    this.add.rectangle(W/2, UI_Y0 + UI_H/2, W, UI_H, 0x0c100c).setDepth(0);
    this.add.rectangle(W/2, UI_Y0 + 1, W, 3, 0x44664a).setDepth(0);
    this.add.rectangle(20, BATTLE_H/2, 40, BATTLE_H, 0x6e4e12).setDepth(1);
    this.add.rectangle(20, BATTLE_H/2, 40, BATTLE_H).setStrokeStyle(2, 0xb89a30).setDepth(2);
    this.add.text(20, 20, '門', { fontSize:'12px', color:'#ccaa44', fontFamily:'serif' }).setOrigin(0.5).setDepth(3);
  }

  /* ── Kibitsu ────────────────────────────── */
  _kb() {
    this.kbBody = this.add.rectangle(KB_X, KB_Y, KB_W, KB_H, 0x2255bb).setDepth(3).setStrokeStyle(2, 0x88aaff);
    this.add.text(KB_X, KB_Y - 8, 'キビツ', { fontSize:'11px', color:'#ccdeff', fontFamily:'serif' }).setOrigin(0.5).setDepth(4);
    this.add.rectangle(KB_X, KB_Y - 48, 54, 9, 0x220000).setDepth(4);
    this.kbHpBar = this.add.rectangle(KB_X - 27, KB_Y - 48, 54, 9, 0x22dd55).setOrigin(0, 0.5).setDepth(4);
  }

  /* ── Header ─────────────────────────────── */
  _hdr() {
    this.hpTxt   = this.add.text(14, UI_Y0 + 6, '', { fontSize:'13px', color:'#88aaff', fontFamily:'Arial' }).setDepth(5);
    this.waveTxt = this.add.text(W/2, UI_Y0 + 14, 'WAVE 1', { fontSize:'21px', color:'#ddcc44', fontFamily:'serif', fontStyle:'bold' }).setOrigin(0.5).setDepth(5);
    this.expTxt  = this.add.text(W - 14, UI_Y0 + 6, '', { fontSize:'13px', color:'#aaee88', fontFamily:'Arial' }).setOrigin(1, 0).setDepth(5);
  }

  /* ── Grid ───────────────────────────────── */
  _grid() {
    this.cBg = []; this.cGfx = []; this.cBdr = []; this.cTxt = [];
    for (let i = 0; i < 9; i++) {
      const col = i % 3, row = Math.floor(i / 3);
      const cellX = GRID_X0 + col * CELL_W;
      const cellY = GRID_TOP + row * CELL_H;
      const cx = cellX + CELL_W / 2, cy = cellY + CELL_H / 2;
      const bg  = this.add.rectangle(cx, cy, CELL_W, CELL_H, 0x050810).setDepth(5);
      const gfx = this.add.graphics().setDepth(6);
      const bdr = this.add.rectangle(cx, cy, CELL_W, CELL_H, 0x000000, 0)
                    .setStrokeStyle(2, 0x334433).setDepth(7);
      const txt = this.add.text(cx, cy, '', {
        fontSize:'11px', color:'#fff', fontFamily:'serif',
        align:'center', stroke:'#000', strokeThickness:3
      }).setOrigin(0.5).setDepth(8);
      this.cBg.push(bg); this.cGfx.push(gfx); this.cBdr.push(bdr); this.cTxt.push(txt);
    }
  }

  /* ── Slash area ─────────────────────────── */
  _slash() {
    this.add.rectangle(W/2, SLASH_Y + SLASH_H/2, W - 20, SLASH_H, 0x141422).setStrokeStyle(2, 0x4444aa).setDepth(5);
    this.slLbl   = this.add.text(W/2, SLASH_Y + 18, '⚔  斬撃', { fontSize:'20px', color:'#ffdd88', fontFamily:'serif', fontStyle:'bold' }).setOrigin(0.5).setDepth(6);
    this.cboLbl  = this.add.text(W/2, SLASH_Y + 38, '', { fontSize:'12px', color:'#ffaa44', fontFamily:'Arial' }).setOrigin(0.5).setDepth(6);
    this.add.text(22, SLASH_Y + SLASH_H - 26, '大技ゲージ', { fontSize:'11px', color:'#8877bb', fontFamily:'Arial' }).setDepth(6);
    this.gPct    = this.add.text(W - 22, SLASH_Y + SLASH_H - 26, '0%', { fontSize:'11px', color:'#8877bb', fontFamily:'Arial' }).setOrigin(1, 0).setDepth(6);
    const gy = SLASH_Y + SLASH_H - 11;
    this.add.rectangle(W/2, gy, W - 40, 14, 0x111122).setDepth(6);
    this.gBar    = this.add.rectangle(20, gy, 0, 14, 0x6633cc).setOrigin(0, 0.5).setDepth(7);
  }

  /* ── Desc ───────────────────────────────── */
  _desc() {
    this.descTxt = this.add.text(W/2, DESC_Y + 10, '呪符枠をタップして配置・付け替え', { fontSize:'11px', color:'#556655', fontFamily:'serif', align:'center' }).setOrigin(0.5).setDepth(5);
  }

  /* ── Super button (battle area BR) ─────── */
  _superBtn() {
    this.sBtnBg  = this.add.rectangle(SB_X, SB_Y, 110, 40, 0x330011).setStrokeStyle(2, 0xff3388).setAlpha(0).setDepth(8);
    this.sBtnTxt = this.add.text(SB_X, SB_Y, '★ 大技発動', { fontSize:'14px', color:'#ff88cc', fontFamily:'serif', fontStyle:'bold', stroke:'#000', strokeThickness:3 }).setOrigin(0.5).setAlpha(0).setDepth(9);
  }

  /* ── Battle overlay ─────────────────────── */
  _ovBuild() {
    this.ovBg    = this.add.rectangle(W/2, BATTLE_H/2, W, BATTLE_H, 0x000).setAlpha(0).setDepth(12);
    this.ovTitle = this.add.text(W/2, BATTLE_H/2 - 30, '', { fontSize:'46px', fontFamily:'serif', fontStyle:'bold', stroke:'#000', strokeThickness:8 }).setOrigin(0.5).setAlpha(0).setDepth(13);
    this.ovSub   = this.add.text(W/2, BATTLE_H/2 + 40, '', { fontSize:'19px', color:'#eee', fontFamily:'Arial' }).setOrigin(0.5).setAlpha(0).setDepth(13);
  }

  /* ── Result screen ──────────────────────── */
  _resBuild() {
    const b = UI_Y0;
    this.resBg  = this.add.rectangle(W/2, b + UI_H/2, W, UI_H, 0x050a05).setAlpha(0).setDepth(14);
    this.resTtl = this.add.text(W/2, b + 22, '', { fontSize:'18px', color:'#ddcc44', fontFamily:'serif', fontStyle:'bold' }).setOrigin(0.5).setAlpha(0).setDepth(15);
    this.resExp = this.add.text(W/2, b + 50, '', { fontSize:'13px', color:'#aaeebb', fontFamily:'Arial' }).setOrigin(0.5).setAlpha(0).setDepth(15);
    this.resBtns = ['呪符を選ぶ', 'キビツを強化する', '次のWAVEへ'].map((lbl, i) => {
      const by = b + 90 + i * 80;
      return {
        bg:  this.add.rectangle(W/2, by, W - 40, 64, 0x0f1f0f).setStrokeStyle(2, 0x44aa44).setAlpha(0).setDepth(15),
        txt: this.add.text(W/2, by, lbl, { fontSize:'18px', color:'#cceecc', fontFamily:'serif' }).setOrigin(0.5).setAlpha(0).setDepth(16),
        i
      };
    });
  }

  /* ── Charm pick screen ──────────────────── */
  _cpBuild() {
    const b = UI_Y0;
    this.cpBg  = this.add.rectangle(W/2, b + UI_H/2, W, UI_H, 0x030508).setAlpha(0).setDepth(17);
    this.cpTtl = this.add.text(W/2, b + 18, '', { fontSize:'16px', color:'#ffdd88', fontFamily:'serif', fontStyle:'bold' }).setOrigin(0.5).setAlpha(0).setDepth(18);
    this.cpBtns = [];
    for (let i = 0; i < 4; i++) {
      const by = b + 60 + i * 96;
      this.cpBtns.push({
        bg: this.add.rectangle(W/2, by, W - 36, 84, 0x0a1520).setStrokeStyle(2, 0x3366aa).setAlpha(0).setDepth(18),
        nm: this.add.text(W/2, by - 18, '', { fontSize:'16px', color:'#88ccff', fontFamily:'serif', fontStyle:'bold' }).setOrigin(0.5).setAlpha(0).setDepth(19),
        ds: this.add.text(W/2, by + 10, '', { fontSize:'12px', color:'#aabbcc', fontFamily:'Arial', align:'center' }).setOrigin(0.5).setAlpha(0).setDepth(19),
        charm: null
      });
    }
    this.cpCnl = this.add.text(W/2, b + 444, '戻る', { fontSize:'14px', color:'#556655', fontFamily:'Arial' }).setOrigin(0.5).setAlpha(0).setDepth(19);
  }

  /* ── Upgrade screen ─────────────────────── */
  _upgBuild() {
    const b = UI_Y0;
    this.upgBg  = this.add.rectangle(W/2, b + UI_H/2, W, UI_H, 0x050308).setAlpha(0).setDepth(17);
    this.upgTtl = this.add.text(W/2, b + 18, 'キビツを強化する', { fontSize:'17px', color:'#ffcc88', fontFamily:'serif', fontStyle:'bold' }).setOrigin(0.5).setAlpha(0).setDepth(18);
    this.upgExp = this.add.text(W/2, b + 48, '', { fontSize:'13px', color:'#aaeeaa', fontFamily:'Arial' }).setOrigin(0.5).setAlpha(0).setDepth(18);
    this.upgBtns = [
      { label:'HP強化',   key:'hp',    cost:20, desc:'+30 最大HP' },
      { label:'斬撃強化', key:'slash',  cost:25, desc:'基本威力 +2' },
      { label:'詠唱短縮', key:'cast',   cost:20, desc:'チャージ速度 +15%' },
    ].map((item, i) => {
      const by = b + 90 + i * 90;
      return {
        bg:  this.add.rectangle(W/2, by, W - 40, 74, 0x100a1a).setStrokeStyle(2, 0x664488).setAlpha(0).setDepth(18),
        lbl: this.add.text(W/2, by - 14, '', { fontSize:'15px', color:'#ccaaff', fontFamily:'serif' }).setOrigin(0.5).setAlpha(0).setDepth(19),
        ds:  this.add.text(W/2, by + 12, '', { fontSize:'12px', color:'#998899', fontFamily:'Arial' }).setOrigin(0.5).setAlpha(0).setDepth(19),
        item
      };
    });
    this.upgCnl = this.add.text(W/2, b + 362, '戻る', { fontSize:'14px', color:'#665566', fontFamily:'Arial' }).setOrigin(0.5).setAlpha(0).setDepth(19);
  }

  /* ── Input ──────────────────────────────── */
  _tap(ptr) {
    const { x, y } = ptr;
    if (this.dead) { this.scene.start('MainScene', { type:'new' }); return; }
    if (this._upgVis) { this._upgTap(x, y); return; }
    if (this._cpVis)  { this._cpTap(x, y);  return; }
    if (this.phase === 'result') { this._resTap(x, y); return; }

    // super button
    if (this.gaugeReady && Math.abs(x - SB_X) < 58 && Math.abs(y - SB_Y) < 22) {
      this._superAtk(); return;
    }

    if (y < BATTLE_H) return;

    // slash area
    if (y >= SLASH_Y && y < SLASH_Y + SLASH_H) { this._doSlash(); return; }

    // grid — always open pick (place or replace)
    if (y >= GRID_TOP && y < GRID_BOT) {
      const col = Math.floor((x - GRID_X0) / CELL_W);
      const row = Math.floor((y - GRID_TOP) / CELL_H);
      if (col >= 0 && col < 3 && row >= 0 && row < 3) {
        const idx = row * 3 + col;
        if (idx < this.unlockedSlots) this._cpOpen('place', idx);
      }
    }
  }

  /* ── Charm pick ─────────────────────────── */
  _cpOpen(mode, slot) {
    this._cpMode = mode; this._cpSlot = slot; this._cpVis = true;
    const choices = mode === 'place'
      ? this.ownedCharms.slice(0, 4)
      : [...CHARM_DEFS].sort(() => Math.random() - 0.5).slice(0, 3);
    this.cpTtl.setText(mode === 'place' ? '呪符を配置する（付け替え可）' : '呪符を選ぶ（3択）');
    this.cpBg.setAlpha(0.97); this.cpTtl.setAlpha(1); this.cpCnl.setAlpha(1);
    for (let i = 0; i < 4; i++) {
      const btn = this.cpBtns[i], c = choices[i];
      if (c) {
        btn.charm = c; btn.bg.setAlpha(1);
        btn.nm.setText(`[${ATTR_NAMES[c.attr] || '－'}] ${c.name}`).setAlpha(1);
        btn.ds.setText(`${c.desc}  [${(c.chargeMs/1000).toFixed(1)}s]`).setAlpha(1);
      } else { btn.charm = null; btn.bg.setAlpha(0); btn.nm.setAlpha(0); btn.ds.setAlpha(0); }
    }
  }

  _cpTap(x, y) {
    const b = UI_Y0;
    if (Math.abs(y - (b + 444)) < 22) { this._cpClose(); return; }
    for (let i = 0; i < 4; i++) {
      const by = b + 60 + i * 96;
      if (Math.abs(y - by) < 46 && this.cpBtns[i].charm) {
        const c = this.cpBtns[i].charm;
        if (this._cpMode === 'place') {
          this.slotCharms[this._cpSlot] = c;
          this.charmTimers[this._cpSlot] = 0;
          this._gridUp();
        } else {
          if (!this.ownedCharms.find(o => o.id === c.id)) this.ownedCharms.push({ ...c });
        }
        this._cpClose(); return;
      }
    }
  }

  _cpClose() {
    this._cpVis = false;
    this.cpBg.setAlpha(0); this.cpTtl.setAlpha(0); this.cpCnl.setAlpha(0);
    for (const b of this.cpBtns) { b.bg.setAlpha(0); b.nm.setAlpha(0); b.ds.setAlpha(0); }
  }

  /* ── Result ─────────────────────────────── */
  _resTap(x, y) {
    for (const btn of this.resBtns) {
      const by = UI_Y0 + 90 + btn.i * 80;
      if (Math.abs(y - by) < 36) {
        if (btn.i === 0)      this._cpOpen('result', -1);
        else if (btn.i === 1) this._upgOpen();
        else                  { this._resClose(); this._nextWave(); }
        return;
      }
    }
  }

  _resOpen() {
    this.phase = 'result';
    this.resBg.setAlpha(0.97);
    this.resTtl.setText(`WAVE ${this.wave} クリア！`).setAlpha(1);
    this.resExp.setText(`EXP: ${this.totalExp}`).setAlpha(1);
    for (const b of this.resBtns) { b.bg.setAlpha(1); b.txt.setAlpha(1); }
  }

  _resClose() {
    this.phase = 'battle';
    this.resBg.setAlpha(0); this.resTtl.setAlpha(0); this.resExp.setAlpha(0);
    for (const b of this.resBtns) { b.bg.setAlpha(0); b.txt.setAlpha(0); }
  }

  /* ── Upgrade ────────────────────────────── */
  _upgOpen() {
    this._upgVis = true;
    this.upgBg.setAlpha(0.97); this.upgTtl.setAlpha(1); this.upgCnl.setAlpha(1);
    this._upgRefresh();
  }

  _upgRefresh() {
    this.upgExp.setText(`所持EXP: ${this.totalExp}`).setAlpha(1);
    for (const b of this.upgBtns) {
      b.bg.setAlpha(1);
      b.lbl.setText(`${b.item.label}  [${b.item.cost} EXP]`).setAlpha(1);
      b.ds.setText(b.item.desc).setAlpha(1);
    }
  }

  _upgTap(x, y) {
    const b = UI_Y0;
    if (Math.abs(y - (b + 362)) < 22) { this._upgClose(); return; }
    for (let i = 0; i < this.upgBtns.length; i++) {
      const by = b + 90 + i * 90;
      if (Math.abs(y - by) < 40) {
        const { cost, key } = this.upgBtns[i].item;
        if (this.totalExp >= cost) { this.totalExp -= cost; this._upgApply(key); this._upgRefresh(); }
        return;
      }
    }
  }

  _upgApply(key) {
    if      (key === 'hp')    { this.kbHPMax += 30; this.kbHP = Math.min(this.kbHP + 30, this.kbHPMax); }
    else if (key === 'slash') { this.slashDmg += 2; }
    else if (key === 'cast')  { for (const c of this.ownedCharms) c.chargeMs = Math.max(400, Math.round(c.chargeMs * 0.85)); }
  }

  _upgClose() {
    this._upgVis = false;
    this.upgBg.setAlpha(0); this.upgTtl.setAlpha(0); this.upgExp.setAlpha(0); this.upgCnl.setAlpha(0);
    for (const b of this.upgBtns) { b.bg.setAlpha(0); b.lbl.setAlpha(0); b.ds.setAlpha(0); }
  }

  /* ── Slash ──────────────────────────────── */
  _doSlash() {
    const list = this.onis.getChildren().filter(o => o.active);
    if (!list.length) return;
    const t = list.reduce((a, b) => a.x < b.x ? a : b);
    const dmg = Math.round(this.slashDmg * this.combo);
    this._oniDmg(t, dmg);
    this._slashFx(t.x, t.y);
    if (this.combo < COMBO_MAX) this.combo = Math.min(COMBO_MAX, Math.round((this.combo + COMBO_STEP) * 10) / 10);
    this.comboTimer = 0;
    this.gauge = Math.min(GAUGE_MAX, this.gauge + GAUGE_HIT);
    this._gaugeUp();
    this._slashLbl();
  }

  _slashFx(tx, ty) {
    this.sfx.clear();
    this.sfx.lineStyle(3, 0xffffff, 1);
    this.sfx.beginPath(); this.sfx.moveTo(tx - 28, ty - 28); this.sfx.lineTo(tx + 28, ty + 28); this.sfx.strokePath();
    this.sfx.lineStyle(2, 0xffcc44, 0.7);
    this.sfx.beginPath(); this.sfx.moveTo(tx - 18, ty - 32); this.sfx.lineTo(tx + 26, ty + 22); this.sfx.strokePath();
    this.tweens.add({ targets: this.sfx, alpha: 0, duration: 180, onComplete: () => { this.sfx.clear(); this.sfx.setAlpha(1); } });
  }

  _slashLbl() { this.cboLbl.setText(this.combo > 1.0 ? `COMBO ×${this.combo.toFixed(1)}` : ''); }

  _gaugeUp() {
    const pct = this.gauge / GAUGE_MAX;
    const col = pct >= 1.0 ? 0xff66aa : pct >= 0.7 ? 0xcc44ff : 0x6633cc;
    this.gBar.setDisplaySize((W - 40) * pct, 14).setFillStyle(col);
    this.gPct.setText(`${Math.floor(pct * 100)}%`);
    if (pct >= 1.0 && !this.gaugeReady) {
      this.gaugeReady = true;
      this.sBtnBg.setAlpha(1); this.sBtnTxt.setAlpha(1);
      this.tweens.add({ targets: [this.sBtnBg, this.sBtnTxt], alpha: { from:1, to:0.35 }, yoyo:true, repeat:-1, duration:450 });
    } else if (pct < 1.0 && this.gaugeReady) {
      this.gaugeReady = false;
      this.tweens.killTweensOf([this.sBtnBg, this.sBtnTxt]);
      this.sBtnBg.setAlpha(0); this.sBtnTxt.setAlpha(0);
    }
  }

  _superAtk() {
    this.gauge = 0; this._gaugeUp();
    for (const oni of this.onis.getChildren().filter(o => o.active)) {
      this._oniDmg(oni, SUPER_DMG);
    }
    this.ovBg.setAlpha(0.28);
    this.time.delayedCall(220, () => this.ovBg.setAlpha(0));
  }

  /* ── Charm auto-fire ────────────────────── */
  _useCharm(idx) {
    const c = this.slotCharms[idx];
    this.charmTimers[idx] = 0; this._cellUp(idx);
    this.descTxt.setText(`${c.name} 発動！`);
    const list = this.onis.getChildren().filter(o => o.active);
    if (!list.length) return;
    const front = list.reduce((a, b) => a.x < b.x ? a : b);

    if (c.id === 'water') {
      this._spell(front, c.dmg, 0x44bbff, c.attr);

    } else if (c.id === 'pierce') {
      const dx = front.x - KB_X, dy = front.y - KB_Y;
      const ang = Math.atan2(dy, dx);
      for (const oni of list) {
        let d = Math.abs(Math.atan2(oni.y - KB_Y, oni.x - KB_X) - ang);
        if (d > Math.PI) d = 2 * Math.PI - d;
        if (d < 0.35) this._oniDmg(oni, c.dmg, c.attr);
      }
      this._beamFx(ang);

    } else if (c.id === 'scatter') {
      const dx = front.x - KB_X, dy = front.y - KB_Y;
      const base = Math.atan2(dy, dx);
      const spread = Math.PI / 5;
      for (let i = 0; i < 5; i++) {
        const ang = base + spread * ((i / 4) - 0.5) * 2;
        const b = this.add.circle(KB_X + KB_W/2 + 4, KB_Y, 7, 0xff88aa).setDepth(3);
        b.vx = BUL_SPD * Math.cos(ang); b.vy = BUL_SPD * Math.sin(ang); b.dmg = c.dmg; b.attr = c.attr;
        this.bullets.add(b);
      }

    } else if (c.id === 'rapid') {
      for (let i = 0; i < 5; i++) {
        this.time.delayedCall(i * 160, () => {
          const rem = this.onis.getChildren().filter(o => o.active);
          if (rem.length) this._spell(rem.reduce((a, b) => a.x < b.x ? a : b), c.dmg, 0x88ffaa, c.attr);
        });
      }
    }
  }

  _spell(t, dmg, col, attr = 'none') {
    if (!t?.active) return;
    const dx = t.x - KB_X, dy = t.y - KB_Y, len = Math.hypot(dx, dy) || 1;
    const b = this.add.circle(KB_X + KB_W/2 + 4, KB_Y, 8, col || 0x44bbff).setDepth(3);
    b.vx = BUL_SPD * dx / len; b.vy = BUL_SPD * dy / len; b.dmg = dmg; b.attr = attr;
    this.bullets.add(b);
  }

  _beamFx(ang) {
    const g = this.add.graphics().setDepth(8);
    g.lineStyle(5, 0xffff66, 0.9);
    g.beginPath(); g.moveTo(KB_X + KB_W/2, KB_Y);
    g.lineTo(KB_X + KB_W/2 + Math.cos(ang) * 500, KB_Y + Math.sin(ang) * 500);
    g.strokePath();
    this.tweens.add({ targets: g, alpha: 0, duration: 300, onComplete: () => g.destroy() });
  }

  /* ── Oni ────────────────────────────────── */
  _spawnOni(count = true) {
    if (count) this.spawned++;
    const sy    = Phaser.Math.Between(48, BATTLE_H - 60);
    const named = this.wave >= 2 && count && (this.spawned % 4 === 0) && Math.random() < (this.wave - 1) * 0.15;
    const hp    = named ? NM_HP : ONI_HP;
    const col   = named ? 0x661199 : 0xaa1a1a;
    const stk   = named ? 0xcc88ff : 0xff6644;
    const spd   = named ? NM_SPD : ONI_SPD;
    const dmg   = named ? NM_DMG : ONI_DMG;
    const bw    = named ? 52 : ONI_BW;
    const hSz   = named ? 64 : ONI_H;
    const name  = named ? NM_NAMES[Phaser.Math.Between(0, 3)] : '鬼';
    const attrPool = ['fire', 'water', 'earth', 'wind'];
    const attrChance = Math.min(1, (this.wave - 2) * 0.25);
    const attr = (this.wave >= 3 && Math.random() < attrChance) ? attrPool[Phaser.Math.Between(0, 3)] : 'none';
    this._makeOni(W + 22, sy, named ? 48 : ONI_W, hSz, col, stk, name, named ? '13px' : '20px', named ? '#ddaaff' : '#ffbbbb', hp, spd, dmg, bw, named ? EXP_N : EXP_G, false, attr);
  }

  _spawnBoss() {
    const name = BOSS_NAMES[Phaser.Math.Between(0, 2)];
    const attrPool = ['fire', 'water', 'earth', 'wind'];
    const attr = this.wave >= 2 ? attrPool[Phaser.Math.Between(0, 3)] : 'none';
    this._makeOni(W + 36, BATTLE_H / 2, 56, 84, 0x220044, 0xff33ff, `【${name}】`, '13px', '#ff88ff', BOSS_HP, BOSS_SPD, BOSS_DMG, 72, EXP_B, true, attr);
  }

  _makeOni(ox, oy, ow, oh, col, stk, name, fs, fc, hp, spd, dmg, bw, exp, isBoss, attr = 'none') {
    const body   = this.add.rectangle(ox, oy, ow, oh, col).setDepth(3).setStrokeStyle(isBoss ? 3 : 2, stk);
    const lbl    = this.add.text(ox, oy, name, { fontSize: fs, color: fc, fontFamily:'serif' }).setOrigin(0.5).setDepth(4);
    const barY   = oy - oh/2 - 6;
    const barH   = isBoss ? 7 : ONI_BH;
    const hpBg   = this.add.rectangle(ox - bw/2, barY, bw, barH, 0x330000).setOrigin(0, 0.5).setDepth(4);
    const hpFill = this.add.rectangle(ox - bw/2, barY, bw, barH, isBoss ? 0xff33ff : (col === 0x661199 ? 0xaa44ff : 0xff2222)).setOrigin(0, 0.5).setDepth(4);
    let attrLbl = null;
    if (attr !== 'none') {
      const ac = '#' + ATTR_COLORS[attr].toString(16).padStart(6, '0');
      attrLbl = this.add.text(ox, barY - 10, ATTR_NAMES[attr], { fontSize:'11px', color: ac, fontFamily:'serif', fontStyle:'bold', stroke:'#000', strokeThickness:2 }).setOrigin(0.5).setDepth(4);
    }
    body.hp = body.maxHp = hp; body.atkT = 0;
    body.lbl = lbl; body.hpBg = hpBg; body.hpFill = hpFill; body.attrLbl = attrLbl;
    body.spd = spd; body.dmg = dmg; body.bw = bw; body.hSz = oh; body.barH = barH;
    body.exp = exp; body.isBoss = isBoss; body.attr = attr;
    this.onis.add(body);
  }

  _oniSync(oni) {
    const by = oni.y - oni.hSz/2 - 6;
    oni.lbl.setPosition(oni.x, oni.y);
    oni.hpBg.setPosition(oni.x - oni.bw/2, by);
    oni.hpFill.setPosition(oni.x - oni.bw/2, by);
    if (oni.attrLbl) oni.attrLbl.setPosition(oni.x, by - 10);
  }

  _oniRm(oni) { oni.lbl?.destroy(); oni.hpBg?.destroy(); oni.hpFill?.destroy(); oni.attrLbl?.destroy(); oni.destroy(); }

  _oniDmg(oni, rawDmg, atkAttr = 'none') {
    if (!oni.active) return;
    const mult = attrMult(atkAttr, oni.attr || 'none');
    const dmg = Math.max(1, Math.round(rawDmg * mult));
    oni.hp -= dmg;
    const r = Phaser.Math.Clamp(oni.hp / oni.maxHp, 0, 1);
    oni.hpFill.setDisplaySize(oni.bw * r, oni.barH);
    const col = mult >= 1.0 ? '#ffff44' : mult >= 0.75 ? '#ffffff' : '#888888';
    this._dmgNum(oni.x, oni.y, dmg, col);
    if (oni.hp <= 0) { this.defeated++; this.totalExp += oni.exp; this._oniRm(oni); }
  }

  _dmgNum(x, y, dmg, col) {
    const t = this.add.text(x, y - 10, String(dmg), { fontSize:'17px', color: col || '#fff', stroke:'#000', strokeThickness:3, fontFamily:'Arial', fontStyle:'bold' }).setOrigin(0.5).setDepth(11);
    this.tweens.add({ targets: t, y: y - 52, alpha: 0, duration: 580, ease:'Power1', onComplete: () => t.destroy() });
  }

  _kbDmg(dmg) {
    if (this.dead) return;
    this.kbHP = Math.max(0, this.kbHP - dmg);
    const r = this.kbHP / this.kbHPMax;
    this.kbHpBar.setDisplaySize(54 * r, 9).setFillStyle(r > 0.5 ? 0x22dd55 : r > 0.25 ? 0xddcc22 : 0xdd2222);
    this.kbBody.setFillStyle(0xff3333);
    this.time.delayedCall(130, () => { if (this.kbBody?.active) this.kbBody.setFillStyle(0x2255bb); });
    if (this.kbHP <= 0) this._gameOver();
  }

  _bullet() {
    const list = this.onis.getChildren().filter(o => o.active);
    if (!list.length) return;
    const t = list.reduce((a, b) => a.x < b.x ? a : b);
    if (t.x - KB_X > BUL_RNG) return;
    const dx = t.x - KB_X, dy = t.y - KB_Y, len = Math.hypot(dx, dy) || 1;
    const b = this.add.circle(KB_X + KB_W/2 + 4, KB_Y, 8, 0x44bbff).setDepth(3);
    b.vx = BUL_SPD * dx / len; b.vy = BUL_SPD * dy / len; b.dmg = BUL_DMG;
    this.bullets.add(b);
  }

  /* ── Wave ───────────────────────────────── */
  _waveClear() {
    this.waveDone = true;
    if (this.unlockedSlots < 9) { this.unlockedSlots++; this._gridUp(); }
    this._saveGame();
    this._ov('WAVE CLEAR!', '#ffff44', `WAVE ${this.wave} 撃退成功！`);
    this.time.delayedCall(1800, () => { this._ovHide(); this._resOpen(); });
  }

  _nextWave() {
    this.wave++;
    this.spawned = this.defeated = this.spawnTimer = 0;
    this.waveDone = this.bossSpawned = false;
    this._gridUp();
  }

  _gameOver() { this.dead = true; deleteSave(); this._ov('GAME OVER', '#ff4444', 'タップしてリスタート'); }

  _ov(title, color, sub) {
    this.ovBg.setAlpha(0.55);
    this.ovTitle.setText(title).setStyle({ color, fontSize:'46px', fontFamily:'serif', fontStyle:'bold', stroke:'#000', strokeThickness:8 }).setAlpha(1);
    this.ovSub.setText(sub).setAlpha(1);
  }
  _ovHide() { this.ovBg.setAlpha(0); this.ovTitle.setAlpha(0); this.ovSub.setAlpha(0); }

  /* ── Save ───────────────────────────────── */
  _saveGame() {
    saveGame({
      wave:          this.wave,
      kbHP:          this.kbHP,
      kbHPMax:       this.kbHPMax,
      slashDmg:      this.slashDmg,
      totalExp:      this.totalExp,
      unlockedSlots: this.unlockedSlots,
      ownedCharms:   this.ownedCharms.map(c => ({ ...c })),
      slotCharmIds:  this.slotCharms.map(c => c ? c.id : null),
      charmTimers:   [...this.charmTimers],
    });
  }

  /* ── UI refresh ─────────────────────────── */
  _hdrUp() {
    this.hpTxt.setText(`HP: ${this.kbHP}/${this.kbHPMax}`);
    this.expTxt.setText(`EXP: ${this.totalExp}`);
    this.waveTxt.setText(`WAVE ${this.wave}`);
  }

  _gridUp() {
    for (let i = 0; i < 9; i++) {
      const locked = i >= this.unlockedSlots;
      const c = this.slotCharms[i];
      const bg = this.cBg[i], gfx = this.cGfx[i], bdr = this.cBdr[i], txt = this.cTxt[i];
      if (locked) {
        bg.setFillStyle(0x050505);
        gfx.clear();
        bdr.setStrokeStyle(1, 0x1a1a1a);
        txt.setText('施錠').setStyle({ color:'#2a2a2a', fontSize:'10px', align:'center', stroke:'#000', strokeThickness:0 });
      } else if (!c) {
        bg.setFillStyle(0x050810);
        gfx.clear();
        bdr.setStrokeStyle(1, 0x334433);
        txt.setText('＋\n空き').setStyle({ color:'#447744', fontSize:'12px', align:'center', stroke:'#000', strokeThickness:2 });
      } else {
        const an = ATTR_NAMES[c.attr] || '－';
        const r = Math.min(1, this.charmTimers[i] / c.chargeMs);
        const ready = r >= 1;
        const attributeColor = ready ? 0xffffff : (ATTR_FILL[c.attr] || ATTR_FILL.none);
        const col = i % 3, row = Math.floor(i / 3);
        const cellX = GRID_X0 + col * CELL_W;
        const cellY = GRID_TOP + row * CELL_H;
        const cellWidth = CELL_W, cellHeight = CELL_H;
        bg.setFillStyle(0x050810);
        gfx.clear();
        const fillHeight = cellHeight * r;
        const fillY = cellY + cellHeight - fillHeight;
        gfx.fillStyle(attributeColor, 0.6);
        gfx.fillRect(cellX, fillY, cellWidth, fillHeight);
        bdr.setStrokeStyle(2, ready ? 0x44ffaa : (r > 0.05 ? attributeColor : 0x334433));
        const pct = Math.floor(r * 100);
        txt.setText(`[${an}]${c.name}\n${ready ? '【発動！】' : `${pct}%`}`)
          .setStyle({ color:'#ffffff', fontSize:'11px', align:'center', stroke:'#000', strokeThickness:3 });
      }
    }
  }

  _cellUp(idx) {
    const c = this.slotCharms[idx]; if (!c) return;
    const r = Math.min(1, this.charmTimers[idx] / c.chargeMs);
    const ready = r >= 1;
    const an = ATTR_NAMES[c.attr] || '－';
    const attributeColor = ready ? 0xffffff : (ATTR_FILL[c.attr] || ATTR_FILL.none);
    const col = idx % 3, row = Math.floor(idx / 3);
    const cellX = GRID_X0 + col * CELL_W;
    const cellY = GRID_TOP + row * CELL_H;
    const chargeRatio = r;
    const cellWidth = CELL_W, cellHeight = CELL_H;
    const gfx = this.cGfx[idx];
    gfx.clear();
    const fillHeight = cellHeight * chargeRatio;
    const fillY = cellY + cellHeight - fillHeight;
    gfx.fillStyle(attributeColor, 0.6);
    gfx.fillRect(cellX, fillY, cellWidth, fillHeight);
    this.cBdr[idx].setStrokeStyle(2, ready ? 0x44ffaa : (r > 0.05 ? attributeColor : 0x334433));
    const pct = Math.floor(r * 100);
    this.cTxt[idx].setText(`[${an}]${c.name}\n${ready ? '【発動！】' : `${pct}%`}`)
      .setStyle({ color:'#ffffff', fontSize:'11px', align:'center', stroke:'#000', strokeThickness:3 });
  }
}

/* ── Phaser ─────────────────────────────────── */
new Phaser.Game({
  type: Phaser.AUTO,
  width: W, height: H,
  backgroundColor: '#000000',
  scene: [TitleScene, MainScene],
  scale: {
    mode: Phaser.Scale.FIT,
    autoCenter: Phaser.Scale.CENTER_BOTH
  }
});
